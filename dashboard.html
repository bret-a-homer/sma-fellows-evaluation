<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMA Fellows Evaluation — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;
  --text:#f2ede4;--text-sec:#9e9a91;--accent:#c9622f;
  --border:#2a2a2a;--success:#4a7c59;--radius:3px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5}
.page{max-width:740px;margin:0 auto;padding:40px 20px 80px}
h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;margin-bottom:6px}
.subtitle{color:var(--text-sec);font-size:13px;margin-bottom:28px;line-height:1.6}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:32px;flex-wrap:wrap}
.filter-bar label{font-size:12px;color:var(--text-sec);font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.filter-bar select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:var(--radius);font-size:13px;cursor:pointer}
.cohort-badge{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:4px 10px;font-size:12px;color:var(--text-sec)}
.dash-snapshot{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:40px}
.snap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 16px;text-align:center}
.snap-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--accent);line-height:1.2}
.snap-label{font-size:12px;font-weight:600;color:var(--text);margin-top:6px;line-height:1.4}
.snap-sub{font-size:11px;color:var(--text-sec);margin-top:4px;line-height:1.4}
.dash-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.dash-section-title{font-weight:600;font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--text);margin-bottom:8px}
.dash-section-desc{font-size:13px;color:var(--text-sec);line-height:1.6;margin-bottom:20px}
.dash-se-legend{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px;color:var(--text-sec);margin-bottom:16px}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* Cleveland grid */
.dash-se-grid{display:grid;grid-template-columns:180px 1fr 48px;gap:8px 12px;align-items:center}
.dash-row-label{font-size:13px;color:var(--text);line-height:1.4}
.dash-delta{font-size:13px;font-weight:600;text-align:right}
.dash-delta.pos{color:var(--success)}.dash-delta.neg{color:#c07050}
/* Cleveland dot */
.cl-dot{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;transform:translate(-50%,-50%);cursor:pointer;transition:transform .15s;z-index:2;border:2px solid #0d0d0d}
.cl-dot:hover{transform:translate(-50%,-50%) scale(1.5)}
/* Commitment / motivation bars */
.commit-bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.commit-bar-label{font-size:12px;color:var(--text);width:130px;flex-shrink:0;line-height:1.3}
.commit-bar-sub{font-size:10px;color:var(--text-sec);font-weight:400}
.dash-bar-track{flex:1;background:var(--border);border-radius:2px;height:10px;overflow:hidden;position:relative}
.dash-bar-fill{height:100%;border-radius:2px}
.dash-bar-val{font-size:12px;color:var(--text-sec);min-width:28px;text-align:right}
.dash-tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.18);pointer-events:none}
.commit-narrative{font-size:13px;color:var(--text-sec);line-height:1.65;margin:16px 0 0;padding:12px 14px;background:var(--surface2);border-left:2px solid var(--accent);border-radius:0 var(--radius) var(--radius) 0}
.commit-narrative em{color:var(--text);font-style:italic}
.commit-deltas{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.commit-delta-item{display:flex;align-items:center;gap:8px}
.commit-delta-val{font-size:16px;font-weight:700;min-width:40px}
.commit-delta-val.pos{color:var(--success)}.commit-delta-val.neg{color:#c07050}
.commit-delta-label{font-size:12px;color:var(--text-sec)}
/* Barriers grid */
.barrier-grid{display:flex;flex-direction:column;gap:10px}
.barrier-row{display:grid;grid-template-columns:160px 1fr 52px;gap:8px;align-items:center}
.barrier-label{font-size:12px;color:var(--text);line-height:1.4}
.barrier-diff{font-size:12px;font-weight:600;text-align:right}
/* Placement */
.placement-row{display:flex;align-items:center;margin-bottom:10px}
.placement-dim-label{font-size:12px;color:var(--text);min-width:180px;line-height:1.3}
/* Career dir */
.career-dir-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.career-dir-tp{font-size:12px;color:var(--text-sec);min-width:160px}
.career-dir-bars{flex:1}
/* Tooltip */
#dash-tip{position:fixed;background:#1e1e1e;border:1px solid #3a3a3a;padding:8px 12px;border-radius:3px;font-size:12px;color:#f2ede4;pointer-events:none;opacity:0;transition:opacity .12s;z-index:9999;max-width:240px;line-height:1.6;white-space:normal}
@media(max-width:520px){
  .dash-se-grid{grid-template-columns:1fr}
  .barrier-row{grid-template-columns:1fr}
  .placement-dim-label{min-width:100px}
  .career-dir-tp{min-width:80px}
}
</style>
</head>
<body>
<div id="dash-tip"></div>
<div class="page">
  <h1>SMA Fellows Evaluation</h1>
  <p class="subtitle">Program effectiveness dashboard — live data from the evaluation tool. Use the cohort filter to compare years.</p>

  <div class="filter-bar">
    <label for="cohort-select">Cohort</label>
    <select id="cohort-select" onchange="location.href='?cohort='+this.value">
      <option value="all" <?= selected==='all'?'selected':'' ?>>All cohorts</option>
      <? var cl=JSON.parse(cohortsList); for(var i=0;i<cl.length;i++){var c=cl[i]; ?>
      <option value="<?= c ?>" <?= selected===c?'selected':'' ?>><?= c ?></option>
      <? } ?>
    </select>
    <span class="cohort-badge" id="n-badge"></span>
  </div>

  <div id="dashboard"></div>
</div>

<script>
const D = <?!= dataJson ?>;
document.getElementById('n-badge').textContent = D.n + ' fellow' + (D.n!==1?'s':'');

// ─── Tooltip ──────────────────────────────────────────────────────────────
const tip = document.getElementById('dash-tip');
function showTip(e, el) {
  tip.innerHTML = (el.getAttribute('data-tip')||'').split('|').join('<br>');
  tip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e) {
  const x = e.clientX + 14, y = e.clientY - 10;
  tip.style.left = '0px'; tip.style.top = '0px';
  const r = tip.getBoundingClientRect();
  tip.style.left = Math.min(x, window.innerWidth - r.width - 8) + 'px';
  tip.style.top  = Math.max(8, y) + 'px';
}
function hideTip() { tip.style.opacity = '0'; }
function attachTips() {
  document.querySelectorAll('[data-tip]').forEach(function(el) {
    el.addEventListener('mouseover', function(e){ showTip(e, el); e.stopPropagation(); });
    el.addEventListener('mousemove', moveTip);
    el.addEventListener('mouseout',  hideTip);
  });
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function ticks(n) {
  let h='';
  for(let i=1;i<n;i++) h+=`<div class="dash-tick" style="left:${(i/n*100).toFixed(1)}%"></div>`;
  return h;
}
function motivLabel(v) {
  return (['External','Introjected','Identified','Integrated','Intrinsic'])[Math.min(Math.max(Math.round(v)-1,0),4)]||'Identified';
}
function motivNarrative(t2then,t2now) {
  const g=t2now-t2then, s=g>=0?'+':'';
  const msg=g>=1.2?'This is a meaningful internalization shift — fellows moved toward genuine ownership of the mission, which SDT research associates with greater persistence and career follow-through.'
    :g>=0.5?'This modest shift suggests some internalization occurred during orientation. Fellows show early signs of owning the mission rather than simply responding to external pull.'
    :'The small corrected shift makes it difficult to attribute meaningful internalization to orientation. Fellows may have arrived with stable motivation, or orientation did not substantially shift their relationship to the mission.';
  return `Fellows' corrected baseline reflects <em>${motivLabel(t2then)}</em> (T2-Then: ${t2then.toFixed(1)}/5). After orientation they reported <em>${motivLabel(t2now)}</em> (T2-Now: ${t2now.toFixed(1)}/5) — corrected shift of ${s}${g.toFixed(2)} ordinal points after accounting for scale recalibration. ${msg}`;
}

// ─── Snapshot ─────────────────────────────────────────────────────────────
function renderSnapshot() {
  const s=D.snapshot, dc=s.careerDirT4.Yes-s.careerDirT1.Yes, ds=dc>=0?'+':'', cc=s.convT4-s.convT1, cs=cc>=0?'+':'';
  return `<div class="dash-snapshot">
    <div class="snap-card"><div class="snap-num">${s.n}</div><div class="snap-label">Fellows in Cohort</div></div>
    <div class="snap-card"><div class="snap-num">${s.recMean.toFixed(1)}<span style="font-size:13px;font-weight:400;color:var(--text-sec)">/10</span></div><div class="snap-label">Avg. Program Recommendation</div><div class="snap-sub">NPS — most recent touchpoint per fellow</div></div>
    <div class="snap-card"><div class="snap-num">${ds}${dc}%</div><div class="snap-label">High-Impact Career Direction</div><div class="snap-sub">Change in % "Yes" from T1 to T4</div></div>
    <div class="snap-card"><div class="snap-num">${s.placementReady}%</div><div class="snap-label">Felt Ready for Placement</div><div class="snap-sub">Rated ≥ 4/5 on retrospective readiness · T3</div></div>
    <div class="snap-card"><div class="snap-num">${s.convT4}%</div><div class="snap-label">Having Career Conversations</div><div class="snap-sub">${cs}${cc}% from T1 (${s.convT1}%) · at T4</div></div>
  </div>`;
}

// ─── Self-Efficacy — Cleveland dot chart ──────────────────────────────────
function renderSelfEfficacy() {
  const {items,t1,t2}=D.selfEfficacy;
  const rows=items.map((item,i)=>{
    const d=(t2[i]-t1[i]).toFixed(1), s=parseFloat(d)>=0?'+':'';
    const t1pct=((t1[i]-1)/6*100).toFixed(1), t2pct=((t2[i]-1)/6*100).toFixed(1);
    const connL=Math.min(parseFloat(t1pct),parseFloat(t2pct)).toFixed(1);
    const connW=Math.abs(parseFloat(t2pct)-parseFloat(t1pct)).toFixed(1);
    const connColor=parseFloat(d)>0?'#c9622f':parseFloat(d)<0?'#7a5050':'#444';
    let tkx='';
    for(let v=1;v<=7;v++) tkx+=`<div style="position:absolute;top:15%;bottom:15%;left:${((v-1)/6*100).toFixed(1)}%;width:1px;background:#2a2a2a;pointer-events:none"></div>`;
    return `<div class="dash-row-label">${item}</div>
      <div style="position:relative;height:22px">
        <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#222;transform:translateY(-50%);pointer-events:none"></div>
        ${tkx}
        <div style="position:absolute;top:50%;left:${connL}%;width:${connW}%;height:2px;background:${connColor};transform:translateY(-50%);pointer-events:none"></div>
        <div class="cl-dot" style="left:${t1pct}%;background:#6a6a6a"
          data-tip="Pre-orientation (T1)|${item}|Score: ${t1[i].toFixed(1)} / 7"></div>
        <div class="cl-dot" style="left:${t2pct}%;background:#c9622f"
          data-tip="Post-orientation (T2)|${item}|Score: ${t2[i].toFixed(1)} / 7"></div>
      </div>
      <div class="dash-delta ${parseFloat(d)>=0?'pos':'neg'}">${s}${d}</div>`;
  }).join('');
  return `<div class="dash-section">
    <h3 class="dash-section-title">Self-Efficacy: Before &amp; After Orientation</h3>
    <p class="dash-section-desc">Cohort average on 1–7 scale. Each row shows the pre-orientation score (gray dot) and post-orientation score (orange dot) connected by a line. Hover dots for exact values.</p>
    <div class="dash-se-legend"><span class="legend-dot" style="background:#6a6a6a"></span>Pre-orientation (T1) &nbsp;&nbsp;<span class="legend-dot" style="background:#c9622f"></span>Post-orientation (T2)</div>
    <div class="dash-se-grid">${rows}</div>
    <div style="display:flex;margin-top:6px">
      <div style="width:180px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;justify-content:space-between;font-size:10px;color:#444;padding:0 1px">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
      </div>
      <div style="width:48px"></div>
    </div>
  </div>`;
}

// ─── Commitment ───────────────────────────────────────────────────────────
function renderCommitment() {
  const {t1now,t2then,t2now}=D.commitment,max=7;
  const nd=(t2now-t1now).toFixed(1),cd=(t2now-t2then).toFixed(1),rs=(t2then-t1now).toFixed(1);
  function bar(val,color,label,sub,tipText) {
    return `<div class="commit-bar-wrap">
      <div class="commit-bar-label">${label}<br><span class="commit-bar-sub">${sub}</span></div>
      <div class="dash-bar-track" style="flex:1;cursor:default" data-tip="${tipText}">
        <div class="dash-bar-fill" style="width:${(val/max*100).toFixed(1)}%;background:${color}"></div>
        ${ticks(7)}
      </div>
      <div class="dash-bar-val">${val.toFixed(1)}</div>
    </div>`;
  }
  function delt(val,label){
    const v=parseFloat(val),s=v>=0?'+':'',c=v>=0?'pos':'neg';
    return `<div class="commit-delta-item"><span class="commit-delta-val ${c}">${s}${val}</span><span class="commit-delta-label">${label}</span></div>`;
  }
  return `<div class="dash-section">
    <h3 class="dash-section-title">Commitment to High-Impact Work — With Reference Shift Correction</h3>
    <p class="dash-section-desc">The corrected gain uses fellows' retrospective T2 rating of their pre-orientation self (T2-Then) as the baseline, accounting for scale recalibration during orientation.</p>
    ${bar(t1now,'#5a5a5a','T1 — Now','Naïve pre-orientation score','T1 — Now (Naïve baseline)|Score: '+t1now.toFixed(2)+' / 7|Not corrected for scale recalibration')}
    ${bar(t2then,'#8a7a6a','T2 — Then','Retrospective pre-orientation baseline','T2 — Then (Corrected baseline)|Score: '+t2then.toFixed(2)+' / 7|Retrospective rating of pre-orientation self')}
    ${bar(t2now,'#c9622f','T2 — Now','Post-orientation score','T2 — Now (Post-orientation)|Score: '+t2now.toFixed(2)+' / 7|Fellows\' current commitment rating')}
    <div class="commit-deltas">
      ${delt(nd,'Naïve gain (T1-Now → T2-Now)')}
      ${delt(cd,'Corrected gain (T2-Then → T2-Now)')}
      ${delt(rs,'Reference shift (scale movement)')}
    </div>
  </div>`;
}

// ─── Motivation — stacked count plots ────────────────────────────────────
function renderMotivation() {
  const {t1now,t2then,t2now,t4now,labels}=D.motivation;
  const t1dist  = D.motivation.t1dist     || [0,0,0,0,0];
  const t2tDist = D.motivation.t2thenDist || [0,0,0,0,0];
  const t2nDist = D.motivation.t2nowDist  || [0,0,0,0,0];
  const t4dist  = D.motivation.t4dist     || [0,0,0,0,0];
  const nd=(t2now-t1now).toFixed(2), cd=(t2now-t2then).toFixed(2);
  const t4nd=((t4now||0)-t1now).toFixed(2), t4cd=((t4now||0)-t2then).toFixed(2);

  const panels=[
    {label:'T1 — Now',  sub:'Pre-orientation',       dist:t1dist,  color:'#6a6a6a'},
    {label:'T2 — Then', sub:'Retrospective baseline', dist:t2tDist, color:'#8a6a4a'},
    {label:'T2 — Now',  sub:'Post-orientation',       dist:t2nDist, color:'#c9622f'},
    {label:'T4 — Now',  sub:'6-month follow-up',      dist:t4dist,  color:'#4a7c59'}
  ];

  const meansArr=[t1now,t2then,t2now,t4now||0];
  const W=600, ML=92, MR=76, MT=10, MB=36;
  const cW=W-ML-MR, panelH=62, panelGap=14, nP=panels.length;
  const chartH=nP*panelH+(nP-1)*panelGap, totalH=MT+chartH+MB;
  const allC=[...t1dist,...t2tDist,...t2nDist,...t4dist];
  const maxC=Math.max(...allC,1);
  const slotW=cW/5, barW=Math.round(slotW*0.52);

  let svg='';

  // X-axis labels once at bottom
  labels.forEach((lab,i)=>{
    const cx=(ML+(i+0.5)*slotW).toFixed(1);
    svg+=`<text x="${cx}" y="${MT+chartH+18}" text-anchor="middle" font-size="10" fill="#6e6a61">${lab}</text>`;
  });

  panels.forEach((panel,pi)=>{
    const pTop=MT+pi*(panelH+panelGap), pBot=pTop+panelH;

    // Baseline
    svg+=`<line x1="${ML}" y1="${pBot}" x2="${ML+cW}" y2="${pBot}" stroke="#2a2a2a" stroke-width="1"/>`;
    // Y-axis stub
    svg+=`<line x1="${ML}" y1="${pTop}" x2="${ML}" y2="${pBot}" stroke="#2a2a2a" stroke-width="0.5"/>`;
    // Max count marker
    svg+=`<text x="${ML-4}" y="${pTop+4}" text-anchor="end" font-size="9" fill="#555" dominant-baseline="hanging">${maxC}</text>`;
    svg+=`<line x1="${ML-3}" y1="${pTop}" x2="${ML}" y2="${pTop}" stroke="#555" stroke-width="0.5"/>`;
    // Zero marker
    svg+=`<text x="${ML-4}" y="${pBot}" text-anchor="end" font-size="9" fill="#555" dominant-baseline="middle">0</text>`;

    // Frequency polygon line points
    const linePts=[];

    panel.dist.forEach((count,i)=>{
      const cx=ML+(i+0.5)*slotW;
      const bh=(count/maxC)*panelH;
      const bx=(cx-barW/2).toFixed(1);
      const by=(pBot-bh).toFixed(1);
      linePts.push({x:cx, y:pBot-bh});

      // Bar
      if(count>0){
        svg+=`<rect x="${bx}" y="${by}" width="${barW}" height="${bh.toFixed(1)}"
          fill="${panel.color}" rx="2" opacity="0.8" style="cursor:pointer"
          data-tip="${panel.label}|${labels[i]}|${count} fellow${count!==1?'s':''} reported this level"/>`;
        // Count label above bar
        if(bh>14){
          svg+=`<text x="${cx.toFixed(1)}" y="${(parseFloat(by)+11).toFixed(1)}"
            text-anchor="middle" font-size="10" fill="#f2ede4" font-weight="600">${count}</text>`;
        } else {
          svg+=`<text x="${cx.toFixed(1)}" y="${(parseFloat(by)-4).toFixed(1)}"
            text-anchor="middle" font-size="10" fill="${panel.color}" font-weight="600">${count}</text>`;
        }
      }
    });

    // Frequency polygon connecting bar midpoints
    const pPts=linePts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
    svg+=`<polyline points="${pPts}" fill="none" stroke="${panel.color}" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>`;

    // Dots at each level (always shown, even count=0)
    linePts.forEach((pt,i)=>{
      const count=panel.dist[i];
      svg+=`<circle cx="${pt.x.toFixed(1)}" cy="${pt.y.toFixed(1)}" r="4.5"
        fill="${count>0?panel.color:'#2a2a2a'}" stroke="#161616" stroke-width="1.5" style="cursor:pointer"
        data-tip="${panel.label}|${labels[i]}|${count} fellow${count!==1?'s':''} reported this level"/>`;
    });

    // Row label left of chart
    svg+=`<text x="${ML-8}" y="${pTop+panelH/2-5}" text-anchor="end" dominant-baseline="middle"
      font-size="11" fill="#f2ede4" font-weight="500">${panel.label}</text>`;
    svg+=`<text x="${ML-8}" y="${pTop+panelH/2+9}" text-anchor="end" dominant-baseline="middle"
      font-size="9" fill="#6e6a61">${panel.sub}</text>`;

    // Means column (right of chart)
    const mean=meansArr[pi], delta=mean-t2then, isBase=pi===1;
    const midY=pTop+panelH/2, colX=W-4;
    const dStr=isBase?'baseline':(delta>=0?'+':'')+delta.toFixed(2);
    const dCol=isBase?'#555':delta>0?'#4a7c59':'#c07050';
    if(pi===0) svg+=`<line x1="${ML+cW+8}" y1="${MT}" x2="${ML+cW+8}" y2="${MT+chartH}" stroke="#2a2a2a" stroke-width="0.5"/>`;
    svg+=`<text x="${colX}" y="${midY-9}" text-anchor="end" font-size="14" fill="#f2ede4" font-weight="600">${mean.toFixed(2)}</text>`;
    svg+=`<text x="${colX}" y="${midY+5}" text-anchor="end" font-size="9" fill="#555">mean</text>`;
    svg+=`<text x="${colX}" y="${midY+18}" text-anchor="end" font-size="10" fill="${dCol}" font-weight="${isBase?400:600}">${dStr}</text>`;
  });

  function delt(val,label){
    const v=parseFloat(val),s=v>=0?'+':'',c=v>=0?'pos':'neg';
    return `<div class="commit-delta-item"><span class="commit-delta-val ${c}">${s}${val}</span><span class="commit-delta-label">${label}</span></div>`;
  }
  return `<div class="dash-section">
    <h3 class="dash-section-title">Motivation Quality — SDT Count Distribution</h3>
    <p class="dash-section-desc">Number of fellows at each motivation level across three timepoints. Dashed line shows the distribution shape. Hover bars or dots for exact counts. A rightward shift signals internalization of the mission.</p>
    <svg viewBox="0 0 ${W} ${totalH}" width="100%" style="display:block;overflow:visible;font-family:Inter,sans-serif">${svg}</svg>
    <div class="commit-deltas">
      ${delt(nd,'Naïve shift (T1-Now → T2-Now)')}
      ${delt(cd,'Corrected shift (T2-Then → T2-Now)')}
      ${delt(t4nd,'Long-term naïve (T1-Now → T4-Now)')}
      ${delt(t4cd,'Long-term corrected (T2-Then → T4-Now)')}
    </div>
  </div>`;
}

// ─── Career Values ────────────────────────────────────────────────────────
function renderCareerValues() {
  const {names,t1,t2,t4}=D.careerValues;
  const W=540,H=230,ML=36,MR=12,MT=16,MB=72,cW=W-ML-MR,cH=H-MT-MB,maxY=6;
  const barColors=['#5a5a5a','#8a6a4a','#c9622f'],barW=11,barGap=2,groupW=cW/names.length;
  const legLabels=['Pre-orientation (T1)','Post-orientation (T2)','Six-month follow-up (T4)'];
  const toPri=r=>7-r;
  let grid='';
  for(let v=0;v<=maxY;v++){
    const y=(MT+cH-(v/maxY)*cH).toFixed(1);
    grid+=`<line x1="${ML}" y1="${y}" x2="${ML+cW}" y2="${y}" stroke="#2a2a2a" stroke-width="${v===0?1:0.5}"/>`;
    if(v>0) grid+=`<text x="${ML-6}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="#6e6a61">${v}</text>`;
  }
  let bars='';
  names.forEach((_,i)=>{
    const cx=ML+i*groupW+groupW/2, blockW=3*barW+2*barGap, bx0=cx-blockW/2;
    [t1[i],t2[i],t4[i]].forEach((rank,j)=>{
      const pri=toPri(rank), bh=((pri/maxY)*cH).toFixed(1);
      const bx=(bx0+j*(barW+barGap)).toFixed(1), by=(MT+cH-parseFloat(bh)).toFixed(1);
      bars+=`<rect x="${bx}" y="${by}" width="${barW}" height="${bh}" fill="${barColors[j]}" rx="1"
        data-tip="${names[i]}|${legLabels[j]}|Avg rank: ${[t1[i],t2[i],t4[i]][j].toFixed(1)} → Priority: ${pri.toFixed(1)} / 6" style="cursor:pointer"/>`;
    });
  });
  const shortNames=[['Altruism'],['Prestige'],['Economic','Return'],['Intellectual','Stim.'],['Independence'],['Achievement']];
  let xLabels='';
  names.forEach((_,i)=>{
    const cx=(ML+i*groupW+groupW/2).toFixed(1), baseY=MT+cH+12;
    (shortNames[i]||[names[i]]).forEach((line,li)=>{xLabels+=`<text x="${cx}" y="${baseY+li*12}" text-anchor="middle" font-size="10" fill="#9e9a91">${line}</text>`;});
  });
  let legend='', lx=ML;
  barColors.forEach((c,j)=>{
    legend+=`<rect x="${lx}" y="${H-14}" width="10" height="10" fill="${c}" rx="1"/><text x="${lx+14}" y="${H-6}" font-size="10" fill="#9e9a91">${legLabels[j]}</text>`;
    lx+=j===0?148:170;
  });
  return `<div class="dash-section">
    <h3 class="dash-section-title">Career Values Ranking — T1 · T2 · T4</h3>
    <p class="dash-section-desc">Priority score = 7 − avg. rank, so the most-valued item has the tallest bar. Hover bars for exact values.</p>
    <svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible;font-family:Inter,sans-serif"><line x1="${ML}" y1="${MT}" x2="${ML}" y2="${MT+cH}" stroke="#3a3a3a" stroke-width="1"/>${grid}${bars}${xLabels}${legend}</svg>
  </div>`;
}

// ─── Barriers — Cleveland dot chart ───────────────────────────────────────
function renderBarriers() {
  const {labels,anticipated,experienced}=D.barriers;
  const rows=labels.map((label,i)=>{
    const ant=anticipated[i], exp=experienced[i], diff=exp-ant, s=diff>=0?'+':'';
    const col=Math.abs(diff)>=15?(diff>0?'#c07050':'#4a7c59'):'var(--text-sec)';
    const connL=Math.min(ant,exp).toFixed(1), connW=Math.abs(exp-ant).toFixed(1);
    const connColor=diff>0?'#7a5050':diff<0?'#4a6a50':'#444';
    let tkx='';
    [0,25,50,75,100].forEach(v=>{
      tkx+=`<div style="position:absolute;top:15%;bottom:15%;left:${v}%;width:1px;background:#2a2a2a;pointer-events:none"></div>`;
    });
    return `<div class="barrier-row">
      <div class="barrier-label">${label}</div>
      <div style="position:relative;height:22px">
        <div style="position:absolute;top:50%;left:0;right:0;height:1px;background:#222;transform:translateY(-50%);pointer-events:none"></div>
        ${tkx}
        <div style="position:absolute;top:50%;left:${connL}%;width:${connW}%;height:2px;background:${connColor};transform:translateY(-50%);pointer-events:none"></div>
        <div class="cl-dot" style="left:${ant}%;background:#6a6a6a"
          data-tip="Anticipated (T2)|${label}|${ant}% of fellows flagged this barrier"></div>
        <div class="cl-dot" style="left:${exp}%;background:#c9622f"
          data-tip="Experienced (T3)|${label}|${exp}% of fellows flagged this barrier"></div>
      </div>
      <div class="barrier-diff" style="color:${col}">${s}${diff}%</div>
    </div>`;
  }).join('');
  return `<div class="dash-section">
    <h3 class="dash-section-title">Anticipated vs. Experienced Barriers</h3>
    <p class="dash-section-desc">% of fellows flagging each barrier at T2 (anticipated, gray dot) vs T3 (experienced, orange dot). Hover dots for exact values. Gaps ≥ 15pp are color-coded.</p>
    <div class="dash-se-legend"><span class="legend-dot" style="background:#6a6a6a"></span>Anticipated (T2) &nbsp;&nbsp;<span class="legend-dot" style="background:#c9622f"></span>Experienced (T3)</div>
    <div class="barrier-grid">${rows}</div>
    <div style="display:flex;margin-top:6px">
      <div style="width:160px;flex-shrink:0"></div>
      <div style="flex:1;display:flex;justify-content:space-between;font-size:10px;color:#444;padding:0 1px">
        <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
      </div>
      <div style="width:52px"></div>
    </div>
  </div>`;
}

// ─── Placement — fixed-width stacked bars ─────────────────────────────────
function renderPlacement() {
  const {dims,dist}=D.placement;
  const starColors=['#6b3030','#7a5030','#7a7030','#4a6a50','#3a6a4a'];
  const starLabels=['1 — Poor','2 — Below avg','3 — Average','4 — Good','5 — Excellent'];
  const rows=dims.map((dim,i)=>{
    const tot=dist[i].reduce((a,b)=>a+b,0);
    const avg=tot?dist[i].reduce((s,c,j)=>s+c*(j+1),0)/tot:0;
    let barHtml;
    if(!tot){
      barHtml=`<div style="flex:1;height:18px;background:#1a1a1a;border-radius:1px;display:flex;align-items:center;padding:0 8px"><span style="font-size:10px;color:#444">No data yet</span></div>`;
    } else {
      barHtml=dist[i].map((count,j)=>{
        if(!count) return '';
        const pct=(count/tot*100).toFixed(1);
        return `<div data-tip="${starLabels[j]}|${dim}|${count} fellow${count!==1?'s':''} — ${Math.round(count/tot*100)}%"
          style="width:${pct}%;background:${starColors[j]};height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
          ${count/tot>=0.12?`<span style="font-size:10px;color:rgba(255,255,255,.75);font-weight:500">${Math.round(count/tot*100)}%</span>`:''}
        </div>`;
      }).join('<div style="width:2px;flex-shrink:0"></div>');
    }
    return `<div class="placement-row">
      <div class="placement-dim-label">${dim}</div>
      <div style="display:flex;flex:1;margin:0 12px;border-radius:2px;overflow:hidden;min-height:18px">${barHtml}</div>
      <div style="font-size:12px;color:var(--text-sec);min-width:32px;text-align:right">${tot?avg.toFixed(1):'—'}</div>
    </div>`;
  }).join('');
  return `<div class="dash-section">
    <h3 class="dash-section-title">Placement Quality — BARS Ratings (T3)</h3>
    <p class="dash-section-desc">Distribution of cohort ratings across three placement quality dimensions. Color runs from low (dark red) to high (green). Hover segments for detail. Average shown at right.</p>
    <div class="dash-se-legend">${starColors.map((c,i)=>`<span class="legend-dot" style="background:${c}"></span>${i+1}`).join(' &nbsp;')}</div>
    <div style="margin-top:16px">${rows}</div>
  </div>`;
}

// ─── Career Direction — fixed-width segments ──────────────────────────────
function renderCareerDir() {
  const {careerDirT1:t1d, careerDirT4:t4d, careerDirT4Then:t4dt}=D.snapshot;
  const t4dtTotal=(t4dt&&(t4dt.Yes+t4dt.Deciding+t4dt.No))||0;
  const naive=t4d.Yes-t1d.Yes, naiveS=naive>=0?'+':'';
  const corrected=t4dtTotal>0?t4d.Yes-t4dt.Yes:null;
  const corrS=corrected!==null&&corrected>=0?'+':'';

  function dirBar(d,label,muted){
    const total=d.Yes+d.Deciding+d.No;
    const op=muted?'opacity:.75':'';
    if(!total){
      return `<div class="career-dir-row" style="${op}"><div class="career-dir-tp">${label}</div><div class="career-dir-bars"><div style="height:28px;border-radius:2px;background:#1a1a1a;display:flex;align-items:center;padding:0 10px"><span style="font-size:11px;color:#444">No data yet</span></div></div></div>`;
    }
    const cats=[
      {val:d.Yes,     bg:'var(--success)', txt:'Pursuing high-impact career'},
      {val:d.Deciding,bg:'#5a5a4a',        txt:'Still deciding'},
      {val:d.No,      bg:'#5a3030',        txt:'Not pursuing'}
    ];
    const segs=cats.filter(c=>c.val>0).map(c=>
      `<div data-tip="${label}|${c.txt}: ${c.val}%"
        style="width:${c.val}%;background:${c.bg};height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
        ${c.val>=10?`<span style="font-size:11px;color:#fff;font-weight:600">${c.val}%</span>`:''}
      </div>`
    ).join('<div style="width:2px;flex-shrink:0"></div>');
    return `<div class="career-dir-row" style="${op}"><div class="career-dir-tp">${label}</div><div class="career-dir-bars"><div style="display:flex;height:28px;border-radius:2px;overflow:hidden;width:100%">${segs}</div></div></div>`;
  }

  function delt(val,label){
    const v=parseFloat(val),s=v>=0?'+':'',c=v>=0?'pos':'neg';
    return `<div class="commit-delta-item"><span class="commit-delta-val ${c}">${s}${val}%</span><span class="commit-delta-label">${label}</span></div>`;
  }

  return `<div class="dash-section">
    <h3 class="dash-section-title">Career Direction — T1 vs. T4</h3>
    <p class="dash-section-desc">"Are you currently pursuing a high-impact career as your primary path?" T4 includes a retrospective then-test to correct for reference-shift bias. Hover segments for detail.</p>
    <div class="dash-se-legend"><span class="legend-dot" style="background:var(--success)"></span>Yes &nbsp;&nbsp;<span class="legend-dot" style="background:#5a5a4a"></span>Still deciding &nbsp;&nbsp;<span class="legend-dot" style="background:#5a3030"></span>No</div>
    <div style="margin-top:16px">
      ${dirBar(t1d,'T1 — Pre-orientation (naïve baseline)',false)}
      ${t4dtTotal>0?dirBar(t4dt,'T4 — Then (retrospective baseline)',true):''}
      ${dirBar(t4d,'T4 — Now',false)}
    </div>
    <div class="commit-deltas" style="margin-top:16px">
      ${delt(naiveS+naive,'Naïve shift (T1 → T4-Now)')}
      ${corrected!==null?delt(corrS+corrected,'Corrected shift (T4-Then → T4-Now)'):''}
    </div>
  </div>`;
}

// ─── Mount ────────────────────────────────────────────────────────────────
if (D.n === 0) {
  document.getElementById('dashboard').innerHTML =
    '<div class="dash-section" style="text-align:center;padding:48px 24px">' +
    '<p style="color:var(--text-sec);font-size:14px">No responses found for this cohort.</p>' +
    '</div>';
} else {
  document.getElementById('dashboard').innerHTML =
    renderSnapshot() +
    renderSelfEfficacy() +
    renderCommitment() +
    renderMotivation() +
    renderCareerValues() +
    renderBarriers() +
    renderPlacement() +
    renderCareerDir();
  attachTips();
}
</script>
</body>
</html>
